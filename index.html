<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こころ進捗計算</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
}

input {
    width: 80px;
    font-size: 16px;
    margin: 4px;
}

.box {
    margin: 6px;
}

.title {
    margin-top: 20px;
    font-weight: bold;
}

#result {
    font-size: 28px;
    margin-top: 20px;
    color: blue;
}

#count {
    font-size: 20px;
    margin-top: 10px;
}

</style>

</head>
<body>

<h2>Sランク進捗計算</h2>


<div class="title">所持数</div>

<div class="box">
D <input type="number" id="d" oninput="calc()">
</div>

<div class="box">
C <input type="number" id="c" oninput="calc()">
</div>

<div class="box">
B <input type="number" id="b" oninput="calc()">
</div>

<div class="box">
A <input type="number" id="a" oninput="calc()">
</div>



<div class="title">必要数設定</div>

<div class="box">
D→C <input type="number" id="dc" value="3" oninput="calc()">
</div>

<div class="box">
C→B <input type="number" id="cb" value="3" oninput="calc()">
</div>

<div class="box">
B→A <input type="number" id="ba" value="3" oninput="calc()">
</div>

<div class="box">
A→S <input type="number" id="as" value="4" oninput="calc()">
</div>



<div id="result">0%</div>

<div id="count">
S作成可能: 0個<br>
次のSまであと: 0
</div>



<script>

function calc() {

    let d = Number(dId().value || 0);
    let c = Number(cId().value || 0);
    let b = Number(bId().value || 0);
    let a = Number(aId().value || 0);

   let dc = Number(dcId().value || 0);
   let cb = Number(cbId().value || 0);
   let ba = Number(baId().value || 0);
   let as = Number(asId().value || 0);

    // S1個に必要なD数
    let needD = dc * cb * ba * as;

    if (needD <= 0) return;

    // D換算
    let totalD =
        d +
        c * dc +
        b * dc * cb +
        a * dc * cb * ba;

    let percent = (totalD / needD) * 100;

    document.getElementById("result").innerText =
        percent.toFixed(1) + "%";


    let sCount = Math.floor(totalD / needD);

    let remain = needD - (totalD % needD);

    if (remain == needD) remain = 0;

    document.getElementById("count").innerHTML =
        "S作成可能: " + sCount + "個<br>" +
        "次のSまであと: " + remain + "D";
}


// 短縮
function dId(){ return document.getElementById("d"); }
function cId(){ return document.getElementById("c"); }
function bId(){ return document.getElementById("b"); }
function aId(){ return document.getElementById("a"); }

function dcId(){ return document.getElementById("dc"); }
function cbId(){ return document.getElementById("cb"); }
function baId(){ return document.getElementById("ba"); }
function asId(){ return document.getElementById("as"); }


calc();

</script>

</body>
</html>

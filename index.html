<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こころ進捗計算</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
}

input {
    width: 80px;
    font-size: 16px;
    margin: 4px;
}

.box {
    margin: 6px;
}

.title {
    margin-top: 20px;
    font-weight: bold;
}

#result {
    font-size: 28px;
    margin-top: 20px;
    color: blue;
}

#count {
    font-size: 20px;
    margin-top: 10px;
}

</style>

</head>
<body>

<h2>Sランク進捗計算</h2>


        <h3>モンスター呼び出し</h3>
    
<select id="monsterSelect">
<option value="">選択してください</option>
</select>


<div class="title">所持数</div>

<div class="box">
D <input type="number" id="d" class="move" oninput="calc()">
</div>

<div class="box">
C <input type="number" id="c" class="move" oninput="calc()">
</div>

<div class="box">
B <input type="number" id="b" class="move" oninput="calc()">
</div>

<div class="box">
A <input type="number" id="a" class="move" oninput="calc()">
</div>



<div class="title">必要数設定</div>

<div class="box">
D→C <input type="number" id="dc" value="3" oninput="calc()">
</div>

<div class="box">
C→B <input type="number" id="cb" value="3" oninput="calc()">
</div>

<div class="box">
B→A <input type="number" id="ba" value="3" oninput="calc()">
</div>

<div class="box">
A→S <input type="number" id="as" value="4" oninput="calc()">
</div>



<div id="result">0%</div>

<div id="count">
S作成可能: 0個<br>
次のSまであと: 0
</div>


    <h3>モンスター登録</h3>

名前
<input type="text" id="mname">

<br>

D→C
<input type="number" id="mdc" value="3">

C→B
<input type="number" id="mcb" value="3">

B→A
<input type="number" id="mba" value="3">

A→S
<input type="number" id="mas" value="4">

<br><br>

<button onclick="saveMonster()">
登録
</button>

    <h4>登録済み</h4>

<div id="monsterList"></div>


<script>

function calc() {

    let d = Number(dId().value || 0);
    let c = Number(cId().value || 0);
    let b = Number(bId().value || 0);
    let a = Number(aId().value || 0);

   let dc = Number(dcId().value || 0);
   let cb = Number(cbId().value || 0);
   let ba = Number(baId().value || 0);
   let as = Number(asId().value || 0);

    // S1個に必要なD数
    let needD = dc * cb * ba * as;

    if (needD <= 0) return;

    // D換算
    let totalD =
        d +
        c * dc +
        b * dc * cb +
        a * dc * cb * ba;

    let percent = (totalD / needD) * 100;

    document.getElementById("result").innerText =
        percent.toFixed(1) + "%";


    let sCount = Math.floor(totalD / needD);

    let remain = needD - (totalD % needD);

    if (remain == needD) remain = 0;

    document.getElementById("count").innerHTML =
        "S作成可能: " + sCount + "個<br>" +
        "次のSまであと: " + remain + "D";
}

    function saveMonster() {

    let name = document.getElementById("mname").value;

    let dc = Number(document.getElementById("mdc").value);
    let cb = Number(document.getElementById("mcb").value);
    let ba = Number(document.getElementById("mba").value);
    let as = Number(document.getElementById("mas").value);

    if (!name) return;

    let data = JSON.parse(
        localStorage.getItem("monsters") || "{}"
    );

    data[name] = {
        dc: dc,
        cb: cb,
        ba: ba,
        as: as
    };

    localStorage.setItem(
        "monsters",
        JSON.stringify(data)
    );

    loadMonsterList();
}

function loadMonsterList() {

    let data = JSON.parse(
        localStorage.getItem("monsters") || "{}"
    );

    let html = "";

    let select =
        '<option value="">選択してください</option>';

    for (let name in data) {

        html +=
            name +
            ' <button onclick="deleteMonster(\'' +
            name +
            '\')">削除</button><br>';

        select +=
            "<option value='" + name + "'>" +
            name +
            "</option>";
    }

    document.getElementById(
        "monsterList"
    ).innerHTML = html;

    document.getElementById(
        "monsterSelect"
    ).innerHTML = select;
}

    
// 短縮
function dId(){ return document.getElementById("d"); }
function cId(){ return document.getElementById("c"); }
function bId(){ return document.getElementById("b"); }
function aId(){ return document.getElementById("a"); }

function dcId(){ return document.getElementById("dc"); }
function cbId(){ return document.getElementById("cb"); }
function baId(){ return document.getElementById("ba"); }
function asId(){ return document.getElementById("as"); }


calc();

    loadMonsterList();

    document
.getElementById("monsterSelect")
.addEventListener(
    "change",
    loadMonsterSetting
);

</script>

<script>

const inputs = document.querySelectorAll(".move");

inputs.forEach((input, index) => {

    input.addEventListener("keydown", function(e) {

        if (e.key === "Enter") {

            e.preventDefault();

            if (index + 1 < inputs.length) {
                inputs[index + 1].focus();
            }

        }

    });

});

    function loadMonsterSetting() {

    let name =
        document.getElementById(
            "monsterSelect"
        ).value;

    if (!name) return;

    let data = JSON.parse(
        localStorage.getItem("monsters") || "{}"
    );

    let m = data[name];

    if (!m) return;

    document.getElementById("dc").value = m.dc;
    document.getElementById("cb").value = m.cb;
    document.getElementById("ba").value = m.ba;
    document.getElementById("as").value = m.as;

    calc();
}

function deleteMonster(name) {

    let data = JSON.parse(
        localStorage.getItem("monsters") || "{}"
    );

    delete data[name];

    localStorage.setItem(
        "monsters",
        JSON.stringify(data)
    );

    loadMonsterList();
    
}
 
</script>
    
</body>
</html>
